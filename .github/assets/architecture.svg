<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13.5">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7d8590"/></marker>
    <linearGradient id="hd" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7c83ff"/><stop offset="1" stop-color="#39c5cf"/></linearGradient>
    <style>
      .box{fill:#161b22;stroke:#30363d;stroke-width:1.5;rx:8}
      .lbl{fill:#e6edf3}.mut{fill:#7d8590}.ln{stroke:#7d8590;stroke-width:1.5;fill:none}
    </style>
  </defs>
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0d1117"/>

  <!-- app -->
  <rect class="box" x="24" y="150" width="120" height="58" rx="8"/>
  <text x="84" y="176" text-anchor="middle" class="lbl" font-weight="bold">your app</text>
  <text x="84" y="194" text-anchor="middle" class="mut">.wrap(ctx, fn)</text>

  <!-- control plane box -->
  <rect x="184" y="40" width="492" height="280" rx="10" fill="#0d1117" stroke="url(#hd)" stroke-width="2"/>
  <text x="200" y="64" fill="url(#hd)" font-weight="bold">ai-rate-limiter · in-process control plane</text>

  <rect class="box" x="208" y="86" width="130" height="52" rx="8"/>
  <text x="273" y="110" text-anchor="middle" class="lbl">estimate cost</text>
  <text x="273" y="127" text-anchor="middle" class="mut">tokens × price</text>

  <rect class="box" x="366" y="86" width="130" height="52" rx="8"/>
  <text x="431" y="110" text-anchor="middle" class="lbl">policy engine</text>
  <text x="431" y="127" text-anchor="middle" class="mut">limits + budgets</text>

  <rect class="box" x="524" y="86" width="130" height="52" rx="8"/>
  <text x="589" y="110" text-anchor="middle" class="lbl">reserve</text>
  <text x="589" y="127" text-anchor="middle" class="mut">atomic · rollback</text>

  <rect class="box" x="366" y="180" width="130" height="52" rx="8"/>
  <text x="431" y="204" text-anchor="middle" class="lbl">reconcile</text>
  <text x="431" y="221" text-anchor="middle" class="mut">real usage</text>

  <rect class="box" x="524" y="180" width="130" height="52" rx="8"/>
  <text x="589" y="204" text-anchor="middle" class="lbl">record</text>
  <text x="589" y="221" text-anchor="middle" class="mut">+ fire alerts</text>

  <rect class="box" x="208" y="180" width="130" height="52" rx="8"/>
  <text x="273" y="204" text-anchor="middle" class="lbl">provider call</text>
  <text x="273" y="221" text-anchor="middle" class="mut">OpenAI/Claude…</text>

  <!-- right side outputs -->
  <rect class="box" x="716" y="56" width="140" height="48" rx="8"/>
  <text x="786" y="85" text-anchor="middle" class="lbl">allow ✓ / 429 ✕</text>

  <rect class="box" x="716" y="150" width="140" height="58" rx="8"/>
  <text x="786" y="174" text-anchor="middle" class="lbl">store</text>
  <text x="786" y="192" text-anchor="middle" class="mut">memory · Redis</text>

  <rect class="box" x="716" y="252" width="140" height="58" rx="8"/>
  <text x="786" y="276" text-anchor="middle" class="lbl">budget board</text>
  <text x="786" y="294" text-anchor="middle" class="mut">+ alerts</text>

  <!-- arrows -->
  <path class="ln" marker-end="url(#arr)" d="M144 179 L204 112"/>
  <path class="ln" marker-end="url(#arr)" d="M338 112 L362 112"/>
  <path class="ln" marker-end="url(#arr)" d="M496 112 L520 112"/>
  <path class="ln" marker-end="url(#arr)" d="M654 112 L712 80"/>
  <path class="ln" marker-end="url(#arr)" d="M589 138 L589 176" stroke-dasharray="4 3"/>
  <path class="ln" marker-end="url(#arr)" d="M524 206 L500 206"/>
  <path class="ln" marker-end="url(#arr)" d="M366 206 L342 206"/>
  <path class="ln" marker-end="url(#arr)" d="M431 138 L431 176" stroke-dasharray="4 3"/>
  <path class="ln" marker-end="url(#arr)" d="M654 206 L712 188"/>
  <path class="ln" marker-end="url(#arr)" d="M786 208 L786 248"/>
  <text x="700" y="44" class="mut" font-size="12">estimate → block before spend · reconcile → exact books</text>
</svg>
