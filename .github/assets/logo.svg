<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c83ff"/>
      <stop offset="0.55" stop-color="#5b9bff"/>
      <stop offset="1" stop-color="#39c5cf"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="0.6" stop-color="#d29922"/>
      <stop offset="1" stop-color="#f85149"/>
    </linearGradient>
  </defs>

  <!-- gauge icon -->
  <g transform="translate(100,100)">
    <path d="M -58 0 A 58 58 0 1 1 58 0" fill="none" stroke="#21262d" stroke-width="14" stroke-linecap="round"/>
    <path d="M -58 0 A 58 58 0 0 1 41 -41" fill="none" stroke="url(#track)" stroke-width="14" stroke-linecap="round"/>
    <!-- needle to ~85% -->
    <line x1="0" y1="0" x2="38" y2="-30" stroke="#e6edf3" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#e6edf3"/>
    <text x="0" y="36" text-anchor="middle" fill="#7d8590" font-size="15" font-weight="700" font-family="ui-monospace, monospace">$</text>
  </g>

  <!-- wordmark -->
  <text x="190" y="92" font-size="52" font-weight="800" fill="url(#g)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">ai-rate-limiter</text>
  <text x="192" y="132" font-size="22" font-weight="600" fill="#e6edf3">Stop surprise LLM bills <tspan fill="#7d8590">before they happen.</tspan></text>
  <text x="192" y="162" font-size="15.5" fill="#7d8590" font-family="ui-monospace, monospace">budgets · token + cost limits · exact spend · OpenAI · Claude · Gemini · Mistral</text>
</svg>
